<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1400, initial-scale=1" />
    <title>WebSocket Workbench Marquee Promo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1400px;
        height: 560px;
        margin: 0;
        overflow: hidden;
        background: #0d1117;
        color: #f8fafc;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .marquee {
        position: relative;
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 44px;
        width: 1400px;
        height: 560px;
        padding: 58px 64px;
        background:
          radial-gradient(circle at 18% 18%, rgba(125, 211, 252, 0.18), transparent 28%),
          radial-gradient(circle at 84% 28%, rgba(45, 212, 191, 0.2), transparent 30%),
          linear-gradient(135deg, #0d1117 0%, #111827 55%, #052e2b 100%);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .brand img {
        width: 64px;
        height: 64px;
      }

      .eyebrow {
        color: #7dd3fc;
        font-size: 13px;
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 46px 0 18px;
        font-size: 58px;
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 20px;
        line-height: 1.45;
      }

      .chips {
        display: flex;
        gap: 10px;
        margin-top: 34px;
      }

      .chips span {
        border: 1px solid rgba(125, 211, 252, 0.36);
        border-radius: 999px;
        padding: 9px 12px;
        color: #e0f2fe;
        background: rgba(8, 47, 73, 0.55);
        font-size: 13px;
        font-weight: 750;
      }

      .screens {
        position: relative;
        min-width: 0;
      }

      .screen {
        position: absolute;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 18px;
        overflow: hidden;
        background: #0f172a;
        box-shadow: 0 38px 120px rgba(0, 0, 0, 0.48);
      }

      .screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: left top;
      }

      .screen.primary {
        left: 24px;
        top: 14px;
        width: 740px;
        height: 462px;
      }

      .screen.secondary {
        right: 0;
        bottom: -18px;
        width: 390px;
        height: 244px;
        border-radius: 14px;
      }
    </style>
  </head>
  <body>
    <main class="marquee" aria-label="WebSocket Workbench marquee promotional tile">
      <section>
        <div class="brand">
          <img src="../store-icon-128.png" alt="" />
          <div>
            <div class="eyebrow">Authorized WebSocket debugging</div>
            <strong>WebSocket Workbench</strong>
          </div>
        </div>
        <h1>Inspect, replay, and document socket traffic.</h1>
        <p>Compact Chrome workbench for developers who need frame evidence without leaking secrets.</p>
        <div class="chips" aria-hidden="true">
          <span>Binary previews</span>
          <span>Text replay</span>
          <span>Redacted evidence</span>
        </div>
      </section>
      <section class="screens" aria-hidden="true">
        <div class="screen primary">
          <img src="../screenshots/01-debugger-binary-inspector-1280x800.png" alt="" />
        </div>
        <div class="screen secondary">
          <img src="../screenshots/02-discovery-redacted-handshake-1280x800.png" alt="" />
        </div>
      </section>
    </main>
  </body>
</html>
